services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3001:3000"
    environment:
      - MB_PLUGINS_DIR=/plugins
      - MB_DB_FILE=/metabase-data/metabase.db
    networks:
      - metabase-network
    volumes:
      - metabase-data:/metabase-data
      - ../target:/plugins
    depends_on:
      firebird:
        condition: service_started
    restart: unless-stopped

  firebird:
    image: firebirdsql/firebird:latest
    container_name: metabase_firebird
    environment:
      - FIREBIRD_PASSWORD=masterkey
      - FIREBIRD_DATABASE=metabase.fdb
      - FIREBIRD_USER=SYSDBA
    ports:
      - "3054:3050"
    volumes:
      - firebird-data:/var/lib/firebird
    networks:
      - metabase-network
    restart: unless-stopped

volumes:
  metabase-data:
  firebird-data:

networks:
  metabase-network:
    driver: bridge
